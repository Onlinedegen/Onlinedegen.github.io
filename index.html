<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Time</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Global Time Website</h1>

    <div class="clock-container">
        <div class="clock">
            <h3>New York</h3>
            <p id="clock-ny">Loading...</p>
        </div>

        <div class="clock">
            <h3>London</h3>
            <p id="clock-ny">Loading...</p>
        </div>

        <div class="clock">
            <h3>Tokyo</h3>
            <p id="clock-ny">Loading...</p>
        </div>
    </div>

    <input id="searchBar" type="text" placeholder="Search timezone (e.g. Europe/Paris)">
    <button id="searchButton">Search</button>

    <h2 id="searchResult"></h2>

    <script src="index.js"></script>
</body>
</html>
